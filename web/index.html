<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="بوابة الإشعارات المدرسية - تطبيق ويب تفاعلي لتلقي الإشعارات الفورية">
  <meta name="theme-color" content="#1f97ff">
  <meta name="color-scheme" content="light dark">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="الإشعارات المدرسية">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" href="favicon.png"/>

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json">

  <title>بوابة الإشعارات المدرسية</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    noscript {
      color: #ff6b6b;
      font-size: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loader">
      <div class="spinner"></div>
      <p>جاري تحميل التطبيق...</p>
    </div>
  </div>

  <noscript>
    عذراً، يتطلب هذا التطبيق تفعيل JavaScript
  </noscript>

  <!-- Service Worker for offline support and notifications -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then((registration) => {
            console.log('✓ Service Worker registered successfully');
          })
          .catch((error) => {
            console.log('✗ Service Worker registration failed:', error);
          });
      });
    }

    // Request notification permissions
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().then((permission) => {
        console.log('Notification permission:', permission);
      });
    }
  </script>

  <!-- Flutter app -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
